name: check-pr

permissions:
  id-token: write
  contents: read

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches:
      - main

jobs:
  validate-version:
    name: Validate .dev expectation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version has .dev suffix
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "Found version: $VERSION"

          if [[ ! "$VERSION" =~ \.dev$ ]]; then
            echo "❌ ERROR: Version in pyproject.toml must end with .dev suffix"
            echo ""
            echo "Current version: $VERSION"
            echo "Expected format: X.Y.Z.dev (e.g., 0.0.1.dev)"
            echo ""
            echo "The .dev suffix indicates unreleased code in the main branch."
            echo "This suffix is automatically removed during the release process."
            echo ""
            echo "Please update pyproject.toml to include the .dev suffix."
            exit 1
          fi

          echo "✅ Version validation passed: $VERSION"

  lint:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --extra test
      - name: Run pytest with coverage
        run: |
          uv run pytest \
            -ra \
            --strict-markers \
            --strict-config \
            --maxfail=1
      - name: Convert coverage to lcov
        run: uv run coverage lcov -o coverage.lcov
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
